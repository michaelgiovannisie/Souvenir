services:
  postgres:
    image: postgres:16-alpine
    container_name: souvenir-db
    environment:
      POSTGRES_DB: souvenir_dev
      POSTGRES_USER: souvenir
      POSTGRES_PASSWORD: souvenir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U souvenir -d souvenir_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: souvenir-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_USERNAME: souvenir
      DB_PASSWORD: souvenir
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-at-least-256-bits-long}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/souvenir_dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: souvenir-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
